<!DOCTYPE html>
<html>

<head>
    <title>IC Tracking Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .navbar {
            background-color: #4f46e5;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            margin-bottom: 20px;
        }

        .navbar h2 {
            margin: 0;
            font-size: 20px;
        }

        .logout-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .logout-btn:hover {
            background-color: #dc2626;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h2>IC Tracking Dashboard</h2>

    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
    <section class="filters">
        <div class="filter-group">
            <input type="date" id="dateInput">
            <button onclick="filterByDate()" class="btn-search">Search Date</button>
            <button onclick="resetFilters()" class="btn-reset">Reset</button>
        </div>
    </section>

    <div class="cards">

        <div class="card">
            <h3>Total Records</h3>
            <p id="total">0</p>
        </div>

        <div class="card">
            <h3>ICs Issued</h3>
            <p class="issued-number">0</p>
        </div>

        <div class="card">
            <h3>ICs Returned</h3>
            <p class="returned-number">0</p>
        </div>
        <div class="card">
            <h3>ICs Pending</h3>
            <p class="pending-number">0</p>
        </div>


    </div>



    <table id="dataTable">

        <tr>
            <th>Student Name</th>
            <th>Reg No</th>
            <th>IC Name</th>
            <th>IC Count</th>
            <th>Issue Time</th>
            <th>Return Time</th>
            <th>Status</th>
        </tr>
        <tbody id="tableBody"></tbody>
    </table>

    <script>

        const BASE_URL = "https://saintgits-lab-tracker-api.onrender.com/api/iclogs";
        const search = document.querySelector('.btn-search');
        const reset = document.querySelector('.btn-reset');
        search.addEventListener('click', filterByDate);
        reset.addEventListener('click', fetchLogs);

        fetchLogs();
        async function fetchLogs() {
            const token = localStorage.getItem('faculty_token');

            try {
                const response = await fetch(`${BASE_URL}`, {
                    method: "GET",
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 401 || response.status === 403) {
                    alert("Session expired. Please login again.");
                    window.location.href = "index.html";
                    return;
                }

                const logs = await response.json();
                renderDashboard(logs);
            } catch (error) {
                console.error("Fetch Error:", error);
            }
        }
        async function filterByDate() {
            const selectedDate = document.getElementById('dateInput').value;
            const token = localStorage.getItem('faculty_token');

            if (!selectedDate) {
                alert("Please select a date first.");
                return;
            }

            try {
                // We append the date as a Query Parameter
                const response = await fetch(`https://saintgits-lab-tracker-api.onrender.com/api/iclogsbydate?date=${selectedDate}`, {
                    method: "GET",
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error("Search failed");

                const logs = await response.json();

                if (logs.length === 0) {
                    alert("No records found for " + selectedDate);
                }


                renderDashboard(logs);

            } catch (error) {
                console.error("Search Error:", error);
            }
        }

        function renderDashboard(logs) {
            const tableBody = document.getElementById('tableBody');
            const totalEl = document.getElementById('total');
            const issuedEl = document.querySelector('.issued-number');
            const returnedEl = document.querySelector('.returned-number');
            const pendingEl = document.querySelector('.pending-number');

            totalEl.innerText = logs.length;


            const totals = logs.reduce((acc, log) => {
                acc.issued += Number(log.qty_issued || 0);
                acc.returned += Number(log.qty_returned || 0);
                acc.balance += Number(log.balance_due || 0);
                return acc;
            }, { issued: 0, returned: 0, balance: 0 });

            // 2. Update Stats Cards
            totalEl.innerText = logs.length; // Number of transactions
            issuedEl.innerText = totals.issued; // Total ICs ever handed out
            returnedEl.innerText = totals.returned;
            pendingEl.innerText = totals.balance; // Total ICs currently with students

            tableBody.innerHTML = "";
            logs.forEach(log => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${log.name}</td>
                    <td>${log.department} - S${log.semester}</td>
                    <td>${log.ic_name}</td>
                    <td>${log.qty_issued}</td>
                    <td>${log.issue_time}</td>
                    <td>${log.return_time || '---'}</td>
                    <td>
                        <span class="status-badge ${log.status.toLowerCase()}">
                            ${log.status}
                        </span>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function logout() {
            // Add your logout logic here (clear cookies/redirect)
            window.location.href = "index.html";
        }

        fetchLogs();

    </script>

</body>

</html>
